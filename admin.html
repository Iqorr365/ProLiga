<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProLiga Admin Panel</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white;padding:20px}
.container{max-width:700px;margin:auto}
.card{background:#111827;border:1px solid #334155;border-radius:20px;padding:20px;margin-bottom:20px}
h1,h2{margin-top:0}
label{display:block;margin-bottom:8px;font-size:14px;color:#cbd5e1}
input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:white;margin-bottom:16px;font-size:15px;box-sizing:border-box}
textarea{min-height:110px;resize:vertical}
button{width:100%;padding:14px;border:none;border-radius:14px;background:#16a34a;color:white;font-size:16px;font-weight:bold;cursor:pointer;margin-top:6px}
.event-btn{background:#2563eb}
.news-btn{background:#f97316}
.success{margin-top:14px;color:#4ade80;text-align:center;font-weight:bold}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>ProLiga Admin</h1>

<label>League</label>
<select id="league">
<option>ProLiga 1</option>
<option>ProLiga 2</option>
</select>

<label>Select Match</label>
<select id="matchSelect"></select>

<label>Home Score</label>
<input type="number" id="homeScore" value="0">

<label>Away Score</label>
<input type="number" id="awayScore" value="0">

<label>Status</label>
<select id="status">
<option>NS</option>
<option>LIVE 1H</option>
<option>HT</option>
<option>LIVE 2H</option>
<option selected>FT</option>
</select>

<label>Live Minute</label>
<input type="number" id="liveMinute" value="1">
  
<button id="saveBtn">Save Match</button>
<div class="success" id="success"></div>
</div>

<div class="card">
<h2>Add Match Event</h2>
<h3 id="selectedMatchInfo" style="color:#93c5fd;margin-top:-6px;margin-bottom:16px;"></h3>

<label>Minute</label>
<input type="number" id="eventMinute" placeholder="14">

<label>Team</label>
<select id="eventTeam"></select>

<label>Event Type</label>
<select id="eventType">
<option value="goal">Goal</option>
<option value="penalty_goal">Penalty Goal</option>
<option value="penalty_miss">Missed Penalty</option>
<option value="yellow">Yellow Card</option>
<option value="red">Red Card</option>
</select>

<button class="event-btn" id="eventBtn">Add Event</button>
<div class="success" id="eventSuccess"></div>
</div>

<div class="card">
<h2>Match Stats</h2>

<label>Home Possession %</label>
<input type="number" id="homePossession" value="50">

<label>Away Possession %</label>
<input type="number" id="awayPossession" value="50">

<label>Home xG</label>
<input type="number" step="0.01" id="homeXg" value="0">

<label>Away xG</label>
<input type="number" step="0.01" id="awayXg" value="0">
  
<label>Home Shots</label>
<input type="number" id="homeShots" value="0">

<label>Away Shots</label>
<input type="number" id="awayShots" value="0">

<label>Home Shots On Target</label>
<input type="number" id="homeShotsOnTarget" value="0">

<label>Away Shots On Target</label>
<input type="number" id="awayShotsOnTarget" value="0">

<label>Home Corners</label>
<input type="number" id="homeCorners" value="0">

<label>Away Corners</label>
<input type="number" id="awayCorners" value="0">

<label>Home Fouls</label>
<input type="number" id="homeFouls" value="0">

<label>Away Fouls</label>
<input type="number" id="awayFouls" value="0">
<button class="event-btn" id="statsBtn">Save Match Stats</button>
<div class="success" id="statsSuccess"></div>
</div>
  
<div class="card">
<h2>Add News</h2>

<label>News Category</label>
<select id="newsCategory">
<option value="General">General</option>
<option value="ProLiga 1">ProLiga 1</option>
<option value="ProLiga 2">ProLiga 2</option>
</select>

<label>News Title</label>
<input type="text" id="newsTitle" placeholder="🔥 Big matchday drama">

<label>News Text</label>
<textarea id="newsText" placeholder="Write anything here. Emojis also work 😄🔥⚽"></textarea>

<button class="news-btn" id="newsBtn">Publish News</button>
<div class="success" id="newsSuccess"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, arrayUnion, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBMOx7FqO0XPWj2HtRG2vRP3GUcr5AsHWY",
authDomain:"proliga-1c9c3.firebaseapp.com",
projectId:"proliga-1c9c3",
storageBucket:"proliga-1c9c3.firebasestorage.app",
messagingSenderId:"855885881253",
appId:"1:855885881253:web:513f4eda5e65bf2ef9524c",
measurementId:"G-87WHR4QBSL"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const leagues={
"ProLiga 1":["Victoria FC","Olimpia FC","Royal Falcons","Olympique Nova","Real Vanguardia","Virello","Union Crest","Inter Blaze","Sporting Vale","City Rangers"],
"ProLiga 2":["Portfield United","Atletico Bellmont","Deportivo Vale","Riverham FC","Westport United","Athletic Crown","Albion Kingsport","FC Southmoor","Highmoor Rovers","Stalovia"]
};

function createSchedule(teams){
const firstHalf=[];
const arr=[...teams];
const rounds=arr.length-1;
const half=arr.length/2;

for(let round=0;round<rounds;round++){
for(let i=0;i<half;i++){
let home=arr[i];
let away=arr[arr.length-1-i];

if(round%2===1){
const temp=home;
home=away;
away=temp;
}

firstHalf.push({home,away,round:round+1});
}

arr.splice(1,0,arr.pop());
}

const secondHalf=firstHalf.map(m=>({
home:m.away,
away:m.home,
round:m.round+rounds
}));

return[...firstHalf,...secondHalf];
}

function makeMatchId(home,away){
return home.toLowerCase().trim().replaceAll(" ","-")+"-"+away.toLowerCase().trim().replaceAll(" ","-");
}

function getSelectedMatch(){
return JSON.parse(document.getElementById("matchSelect").value);
}

function updateEventTeams(){
const selected=getSelectedMatch();

document.getElementById("selectedMatchInfo").textContent=
selected.homeTeam+" vs "+selected.awayTeam;

const eventTeam=document.getElementById("eventTeam");
eventTeam.innerHTML="";

[selected.homeTeam,selected.awayTeam].forEach(team=>{
const option=document.createElement("option");
option.value=team;
option.textContent=team;
eventTeam.appendChild(option);
});
}

function loadMatches(){
const league=document.getElementById("league").value;
const teams=leagues[league];
const matches=createSchedule(teams);
const select=document.getElementById("matchSelect");

select.innerHTML="";

matches.forEach(match=>{
const option=document.createElement("option");

option.value=JSON.stringify({
league,
round:match.round,
homeTeam:match.home,
awayTeam:match.away
});

option.textContent="Matchday "+match.round+" | "+match.home+" vs "+match.away;
select.appendChild(option);
});

updateEventTeams();
}

document.getElementById("league").onchange=loadMatches;
document.getElementById("matchSelect").onchange=updateEventTeams;

document.getElementById("saveBtn").onclick=async()=>{
const selected=getSelectedMatch();

const league=selected.league;
const round=Number(selected.round);
const homeTeam=selected.homeTeam;
const awayTeam=selected.awayTeam;

const homeScore=Number(document.getElementById("homeScore").value);
const awayScore=Number(document.getElementById("awayScore").value);
const status=document.getElementById("status").value;
const liveMinute=Number(document.getElementById("liveMinute").value);
const liveStartedAt=Date.now();

const matchId=makeMatchId(homeTeam,awayTeam);

await setDoc(doc(db,"matches",matchId),{
league,
round,
homeTeam,
awayTeam,
homeScore,
awayScore,
status,
liveMinute,
liveStartedAt,
},{merge:true});

document.getElementById("success").textContent=
"Saved: "+homeTeam+" "+homeScore+" - "+awayScore+" "+awayTeam;
};

document.getElementById("eventBtn").onclick=async()=>{
const selected=getSelectedMatch();

const league=selected.league;
const round=Number(selected.round);
const homeTeam=selected.homeTeam;
const awayTeam=selected.awayTeam;

const minute=document.getElementById("eventMinute").value;
const team=document.getElementById("eventTeam").value;
const type=document.getElementById("eventType").value;

if(!minute){
document.getElementById("eventSuccess").textContent="Enter minute first.";
return;
}

const matchId=makeMatchId(homeTeam,awayTeam);

await setDoc(doc(db,"matches",matchId),{
league,
round,
homeTeam,
awayTeam,
events:arrayUnion({
minute:minute+"'",
team,
type
})
},{merge:true});

document.getElementById("eventSuccess").textContent=
"Event added: "+minute+"' "+team+" "+type;

document.getElementById("eventMinute").value="";
};

document.getElementById("statsBtn").onclick=async()=>{

const selected=getSelectedMatch();

const league=selected.league;
const round=Number(selected.round);
const homeTeam=selected.homeTeam;
const awayTeam=selected.awayTeam;

const stats={
homePossession:Number(document.getElementById("homePossession").value),
awayPossession:Number(document.getElementById("awayPossession").value),

homeShots:Number(document.getElementById("homeShots").value),
awayShots:Number(document.getElementById("awayShots").value),

homeShotsOnTarget:Number(document.getElementById("homeShotsOnTarget").value),
awayShotsOnTarget:Number(document.getElementById("awayShotsOnTarget").value),

homeCorners:Number(document.getElementById("homeCorners").value),
awayCorners:Number(document.getElementById("awayCorners").value),

homeFouls:Number(document.getElementById("homeFouls").value),
awayFouls:Number(document.getElementById("awayFouls").value)
};

const matchId=makeMatchId(homeTeam,awayTeam);

await setDoc(doc(db,"matches",matchId),{
league,
round,
homeTeam,
awayTeam,
stats
},{merge:true});

document.getElementById("statsSuccess").textContent=
"Match stats saved successfully!";

};
  
document.getElementById("newsBtn").onclick=async()=>{
const category=document.getElementById("newsCategory").value;
const title=document.getElementById("newsTitle").value.trim();
const text=document.getElementById("newsText").value.trim();

if(!title || !text){
document.getElementById("newsSuccess").textContent="Enter title and text first.";
return;
}

await addDoc(collection(db,"news"),{
category,
title,
text,
createdAt:serverTimestamp()
});

document.getElementById("newsSuccess").textContent="News published successfully!";
document.getElementById("newsTitle").value="";
document.getElementById("newsText").value="";
};

loadMatches();
</script>

</body>
</html>
