<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProLiga Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#111827;
border:1px solid #334155;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

h1{
margin-top:0;
font-size:32px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#cbd5e1;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
margin-bottom:16px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#16a34a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.success{
margin-top:14px;
color:#4ade80;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>ProLiga Admin</h1>

<label>League</label>
<select id="league">
<option>ProLiga 1</option>
<option>ProLiga 2</option>
</select>

<label>Round</label>
<input type="number" id="round" value="1">

<label>Home Team</label>
<input type="text" id="homeTeam" placeholder="Victoria FC">

<label>Away Team</label>
<input type="text" id="awayTeam" placeholder="City Rangers">

<label>Home Score</label>
<input type="number" id="homeScore" value="0">

<label>Away Score</label>
<input type="number" id="awayScore" value="0">

<label>Status</label>
<select id="status">
<option>NS</option>
<option>LIVE</option>
<option>HT</option>
<option selected>FT</option>
</select>

<button id="saveBtn">Save Match</button>

<div class="success" id="success"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBMOx7FqO0XPWj2HtRG2vRP3GUcr5AsHWY",
authDomain:"proliga-1c9c3.firebaseapp.com",
projectId:"proliga-1c9c3",
storageBucket:"proliga-1c9c3.firebasestorage.app",
messagingSenderId:"855885881253",
appId:"1:855885881253:web:513f4eda5e65bf2ef9524c",
measurementId:"G-87WHR4QBSL"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

document.getElementById("saveBtn").onclick=async()=>{

const league=document.getElementById("league").value;
const round=Number(document.getElementById("round").value);
const homeTeam=document.getElementById("homeTeam").value;
const awayTeam=document.getElementById("awayTeam").value;
const homeScore=Number(document.getElementById("homeScore").value);
const awayScore=Number(document.getElementById("awayScore").value);
const status=document.getElementById("status").value;

const matchId=
homeTeam.toLowerCase().replaceAll(" ","-")
+"-"+
awayTeam.toLowerCase().replaceAll(" ","-");

await setDoc(doc(db,"matches",matchId),{
league,
round,
homeTeam,
awayTeam,
homeScore,
awayScore,
status
});

document.getElementById("success").textContent=
"Match saved successfully!";
};
</script>

</body>
</html>
