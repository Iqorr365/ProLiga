<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProLiga Match Center</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#08111f;color:#e5e7eb}
header{padding:18px;text-align:center;background:#020617;border-bottom:1px solid #1e293b}
header h1{margin:0;font-size:24px}
header p{margin:6px 0 0;color:#94a3b8;font-size:13px}
main{max-width:850px;margin:18px auto;padding:0 12px 40px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.match-top{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:18px}
.scoreboard{display:grid;grid-template-columns:1fr 120px 1fr;gap:12px;align-items:center}
.team{text-align:center}
.team img{width:76px;height:76px;object-fit:contain;margin-bottom:8px}
.team-name{font-weight:bold;font-size:15px;color:white}
.score{font-size:42px;font-weight:bold;text-align:center;color:white}
.status{display:inline-block;margin-bottom:8px;padding:5px 12px;border-radius:999px;background:#dc2626;color:white;font-size:12px;font-weight:bold}
h2{margin:0 0 14px;font-size:20px}
.timeline{position:relative;padding:8px 0}
.timeline:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:#334155;transform:translateX(-50%)}
.event{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;margin:14px 0;position:relative}
.minute{text-align:center;font-weight:bold;color:#cbd5e1;background:#111827;border:1px solid #334155;border-radius:999px;padding:5px 0;z-index:2;font-size:13px}
.event-box{background:#111827;border:1px solid #334155;border-radius:14px;padding:10px 12px;font-size:14px}
.event-left{text-align:right;margin-right:12px}
.event-right{text-align:left;margin-left:12px}
.goal{border-color:#16a34a}
.yellow{border-color:#eab308}
.red{border-color:#dc2626}
.empty{visibility:hidden}
.stats-row{margin:18px 0}
.stats-top{display:grid;grid-template-columns:60px 1fr 60px;align-items:center;margin-bottom:8px;font-weight:bold}
.stats-name{text-align:center;color:#e5e7eb}
.stats-left{text-align:left;color:white}
.stats-right{text-align:right;color:white}
.stats-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bar-bg{height:10px;background:#1e293b;border-radius:999px;overflow:hidden;display:flex}
.bar-fill{height:100%;background:#22c55e;border-radius:999px;margin-left:auto}
.bar-fill.away-fill{background:#6366f1;margin-left:0}

@keyframes eventPop{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}
.event{animation:eventPop .35s ease}

@keyframes scoreFlash{
0%{transform:scale(1);text-shadow:none}
35%{transform:scale(1.12);text-shadow:0 0 24px rgba(34,197,94,.95)}
100%{transform:scale(1);text-shadow:none}
}
.score-flash{animation:scoreFlash .9s ease}

.momentum-wrap{display:grid;grid-template-columns:42px 1fr;gap:12px;align-items:center}
.momentum-logos{display:grid;grid-template-rows:1fr 1fr;height:126px;align-items:center}
.momentum-logos img{width:34px;height:34px;object-fit:contain}

.momentum-main{display:grid;grid-template-rows:18px 126px 22px;gap:6px}
.momentum-events{position:relative;height:18px}
.momentum-events.bottom{height:22px}
.momentum-events.bottom .momentum-event{top:4px}
.momentum-area{position:relative;height:126px;border-radius:14px;background:#111827;border:1px solid #334155;padding:8px;overflow:hidden}
.momentum-mid{position:absolute;left:8px;right:8px;top:50%;height:1px;background:#475569}
.momentum-ht{position:absolute;top:8px;bottom:8px;left:50%;width:1px;background:#64748b}
.momentum-bars{height:100%;display:grid;grid-template-columns:repeat(90,1fr);gap:2px;align-items:center}
.momentum-bar{position:relative;height:100%}
.momentum-fill{position:absolute;left:0;right:0;border-radius:3px}
.momentum-home{bottom:50%;background:#22c55e}
.momentum-away{top:50%;background:#6366f1}
.momentum-event{position:absolute;font-size:9px;transform:translateX(-50%);z-index:10;line-height:1;pointer-events:none}

.pen-icon{position:relative;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;font-size:8px;line-height:1;color:#22c55e;margin:0 2px;vertical-align:middle}
.pen-icon:before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:10px;height:6px;border:1px solid currentColor;border-bottom:0;border-radius:2px 2px 0 0;pointer-events:none}
.pen-miss{color:#dc2626}

.back{display:block;text-align:center;color:#93c5fd;text-decoration:none;margin-top:14px}

@media(max-width:650px){
.scoreboard{grid-template-columns:1fr 90px 1fr}
.team img{width:58px;height:58px}
.score{font-size:34px}
.event{grid-template-columns:1fr 48px 1fr}
.event-box{font-size:12px;padding:8px}

.momentum-wrap{grid-template-columns:24px 1fr;gap:6px}
.momentum-logos{height:82px}
.momentum-logos img{width:20px;height:20px}
.momentum-main{grid-template-rows:13px 82px 17px;gap:4px}
.momentum-events{height:13px}
.momentum-events.bottom{height:17px}
.momentum-events.bottom .momentum-event{top:3px}
.momentum-area{height:82px;padding:5px}
.momentum-bars{gap:1px}
.momentum-event{font-size:7px}
.momentum-event .pen-icon{width:10px;height:10px;font-size:6px;margin:0 1px}
.momentum-event .pen-icon:before{top:0;width:8px;height:4px;border-width:1px}
}
</style>
</head>

<body>

<header>
<h1>PROLIGA MATCH CENTER</h1>
<p>Live match details and timeline</p>
</header>

<main>

<section class="card">
<div class="match-top" id="matchInfo"></div>

<div class="scoreboard">
<a id="homeTeamLink" style="color:white;text-decoration:none;">
<div class="team">
<img id="homeLogo">
<div class="team-name" id="homeTeam"></div>
</div>
</a>

<div>
<div style="text-align:center">
<span class="status" id="status">NS</span>
</div>
<div class="score" id="score">- : -</div>
</div>

<a id="awayTeamLink" style="color:white;text-decoration:none;">
<div class="team">
<img id="awayLogo">
<div class="team-name" id="awayTeam"></div>
</div>
</a>
</div>
</section>

<section class="card" id="momentumCard" style="display:none;">
<h2>Attack Momentum</h2>
<div id="momentumChart"></div>
</section>
  
<section class="card">
<h2>Match Timeline</h2>
<div class="timeline" id="timeline"></div>
</section>

<section class="card">
<h2>Match Stats</h2>
<div id="matchStats"></div>
</section>
  
<a class="back" href="index.html">← Back to ProLiga</a>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMOx7FqO0XPWj2HtRG2vRP3GUcr5AsHWY",
authDomain: "proliga-1c9c3.firebaseapp.com",
projectId: "proliga-1c9c3",
storageBucket: "proliga-1c9c3.firebasestorage.app",
messagingSenderId: "855885881253",
appId: "1:855885881253:web:513f4eda5e65bf2ef9524c",
measurementId: "G-87WHR4QBSL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const clubLogos={
"Victoria FC":"Projekt bez nazwy_20260508_214403_0000.png",
"Olimpia FC":"Projekt bez nazwy_20260508_214448_0000.png",
"City Rangers":"Projekt bez nazwy_20260508_215405_0000.png",
"Royal Falcons":"Projekt bez nazwy_20260508_214638_0000.png",
"Sporting Vale":"Projekt bez nazwy_20260508_215323_0000.png",
"Virello":"Projekt bez nazwy_20260508_214902_0000.png",
"Union Crest":"Projekt bez nazwy_20260508_215049_0000.png",
"Real Vanguardia":"Projekt bez nazwy_20260508_214803_0000.png",
"Olympique Nova":"Projekt bez nazwy_20260508_214723_0000.png",
"Inter Blaze":"Projekt bez nazwy_20260508_215133_0000.png",
"Portfield United":"Projekt bez nazwy_20260508_215742_0000.png",
"Atletico Bellmont":"Projekt bez nazwy_20260508_215824_0000.png",
"Deportivo Vale":"Projekt bez nazwy_20260508_220602_0000.png",
"Riverham FC":"Projekt bez nazwy_20260508_220656_0000.png",
"Westport United":"Projekt bez nazwy_20260508_220739_0000.png",
"Athletic Crown":"Projekt bez nazwy_20260508_220817_0000.png",
"Albion Kingsport":"Projekt bez nazwy_20260508_220954_0000.png",
"FC Southmoor":"Projekt bez nazwy_20260508_221106_0000.png",
"Highmoor Rovers":"Projekt bez nazwy_20260508_221147_0000.png",
"Stalovia":"Projekt bez nazwy_20260508_221225_0000.png"
};

const localScores={
"ProLiga 1":{
"1|Victoria FC|City Rangers": {home: 2, away: 1},
"1|Olimpia FC|Sporting Vale": {home: 4, away: 4},
"1|Royal Falcons|Inter Blaze": {home: 2, away: 2},
"1|Olympique Nova|Union Crest": {home: 3, away: 4},
"1|Real Vanguardia|Virello": {home: 1, away: 6}
},
"ProLiga 2":{
"1|Portfield United|Stalovia": {home: 5, away: 3},
"1|Atletico Bellmont|Highmoor Rovers": {home: 3, away: 3},
"1|Deportivo Vale|FC Southmoor": {home: 2, away: 4},
"1|Riverham FC|Albion Kingsport": {home: 4, away: 2},
"1|Westport United|Athletic Crown": {home: 1, away: 2}
}
};

function makeMatchId(home,away){
return home.toLowerCase().trim().replaceAll(" ","-")+"-"+away.toLowerCase().trim().replaceAll(" ","-");
}

function getLiveMinute(data){
if(!data.status)return "NS";
if(data.status==="HT")return "HT";
if(data.status==="FT")return "FT";
if(data.status!=="LIVE 1H" && data.status!=="LIVE 2H")return data.status;

const started=data.liveStartedAt || Date.now();
const diff=Math.floor((Date.now()-started)/60000);
let minute=(data.liveMinute || 1)+diff;

if(data.status==="LIVE 1H"){
if(minute>50)minute=50;
if(minute>45)return "LIVE 45+"+(minute-45)+"'";
}

if(data.status==="LIVE 2H"){
if(minute>100)minute=100;
if(minute>90)return "LIVE 90+"+(minute-90)+"'";
}

return "LIVE "+minute+"'";
}

function statRow(name,homeValue,awayValue,suffix="",decimals=false){
const h=Number(homeValue || 0);
const a=Number(awayValue || 0);

const hText=decimals ? h.toFixed(2) : h;
const aText=decimals ? a.toFixed(2) : a;

const total=h+a;

let homeWidth=50;
let awayWidth=50;

if(total>0){
homeWidth=(h/total)*100;
awayWidth=(a/total)*100;
}

return `
<div class="stats-row">
<div class="stats-top">
<div class="stats-left">${hText}${suffix}</div>
<div class="stats-name">${name}</div>
<div class="stats-right">${aText}${suffix}</div>
</div>
<div class="stats-bars">
<div class="bar-bg"><div class="bar-fill" style="width:${homeWidth}%"></div></div>
<div class="bar-bg"><div class="bar-fill away-fill" style="width:${awayWidth}%"></div></div>
</div>
</div>
`;
}

function renderMomentum(momentum,events,homeLogo,awayLogo,home){
const card=document.getElementById("momentumCard");
const box=document.getElementById("momentumChart");

if(!momentum || momentum.length===0){
card.style.display="none";
box.innerHTML="";
return;
}

card.style.display="block";

let values=[...momentum];

while(values.length<90){
values.push(values[values.length-1] || 0);
}

values=values.slice(0,90);

function buildEventMarkers(side){
return events.map((event,index)=>{
const minute=parseInt(event.minute);

if(!minute || minute<1)return "";

const displayMinute=Math.min(minute,90);
const extraOffset=minute>90 ? (index%4)*7 : 0;

let icon="";

if(event.type==="goal")icon="⚽";
if(event.type==="penalty_goal")icon='<span class="pen-icon">⚽</span>';
if(event.type==="penalty_miss")icon='<span class="pen-icon pen-miss">⚽</span>';
if(event.type==="red")icon="🟥";

if(!icon)return "";

const isHome=event.team===home;
if(side==="home" && !isHome)return "";
if(side==="away" && isHome)return "";

const pos = side==="home"
    ? "top:0;"
    : "bottom:0;";

return `
<div class="momentum-event"
     style="${pos}left:calc(${(displayMinute/90)*100}% - ${extraOffset}px)">
${icon}
</div>
`;
}).join("");
}

box.innerHTML=`
<div class="momentum-wrap">
<div class="momentum-logos">
<img src="${homeLogo}">
<img src="${awayLogo}">
</div>

<div class="momentum-main">
<div class="momentum-events">${buildEventMarkers("home")}</div>

<div class="momentum-area">
<div class="momentum-mid"></div>
<div class="momentum-ht"></div>
<div class="momentum-bars">
${values.map(value=>{
const v=Math.max(-10,Math.min(10,Number(value)||0));
const height=Math.abs(v)*10;
const cls=v>=0?"momentum-home":"momentum-away";
return `<div class="momentum-bar"><div class="momentum-fill ${cls}" style="height:${height}%"></div></div>`;
}).join("")}
</div>
</div>

<div class="momentum-events bottom">${buildEventMarkers("away")}</div>
</div>
</div>
`;
}
  
const params=new URLSearchParams(window.location.search);
const raw=params.get("id");

if(raw){
const parts=decodeURIComponent(raw).split("|");

const league=parts[0];
const round=parts[1];
const home=parts[2];
const away=parts[3];

const firebaseId=makeMatchId(home,away);
const matchRef=doc(db,"matches",firebaseId);

document.getElementById("matchInfo").textContent=league+" • Matchday "+round;
document.getElementById("homeTeam").textContent=home;
document.getElementById("awayTeam").textContent=away;
document.getElementById("homeTeamLink").href="team.html?team="+encodeURIComponent(home);
document.getElementById("awayTeamLink").href="team.html?team="+encodeURIComponent(away);
document.getElementById("homeLogo").src=clubLogos[home] || "";
document.getElementById("awayLogo").src=clubLogos[away] || "";

let lastScoreText=null;
let latestLiveData=null;

function renderMatch(data){
let score=null;
let status="NS";
let events=[];
let stats=null;
let momentum=[];

if(data && data.homeScore !== undefined && data.awayScore !== undefined){
score={home:data.homeScore,away:data.awayScore};
status=getLiveMinute(data);
events=data.events || [];
stats=data.stats || null;
momentum=data.momentum || [];
latestLiveData=data;
}else{
score=localScores[league]?.[round+"|"+home+"|"+away] || null;
if(score)status="FT";
latestLiveData=null;
}

const scoreEl=document.getElementById("score");
const statusEl=document.getElementById("status");

if(score){
const newScoreText=score.home+" : "+score.away;

scoreEl.textContent=newScoreText;
statusEl.textContent=status;

if(lastScoreText && lastScoreText!==newScoreText){
scoreEl.classList.add("score-flash");
setTimeout(()=>{
scoreEl.classList.remove("score-flash");
},1000);
}

lastScoreText=newScoreText;
}else{
scoreEl.textContent="- : -";
statusEl.textContent="NS";
lastScoreText=null;
}

const timeline=document.getElementById("timeline");
timeline.innerHTML="";

if(events.length===0){
timeline.innerHTML='<p style="text-align:center;color:#94a3b8;">No events yet</p>';
}else{
events.sort((a,b)=>parseInt(a.minute)-parseInt(b.minute));

events.forEach(event=>{
const isHome=event.team===home;

let icon="⚽";
let className="goal";

if(event.type==="penalty_goal"){
icon='<span class="pen-icon">⚽</span>';
className="goal";
}

if(event.type==="penalty_miss"){
icon='<span class="pen-icon pen-miss">⚽</span>';
className="red";
}

if(event.type==="yellow"){
icon="🟨";
className="yellow";
}

if(event.type==="red"){
icon="🟥";
className="red";
}

const row=document.createElement("div");
row.className="event";

if(isHome){
row.innerHTML=`
<div class="event-box event-left ${className}">${icon} ${event.team}</div>
<div class="minute">${event.minute}</div>
<div class="empty"></div>
`;
}else{
row.innerHTML=`
<div class="empty"></div>
<div class="minute">${event.minute}</div>
<div class="event-box event-right ${className}">${event.team} ${icon}</div>
`;
}

timeline.appendChild(row);
});
}

const statsBox=document.getElementById("matchStats");

if(stats){
statsBox.innerHTML=
statRow("Possession",stats.homePossession,stats.awayPossession,"%")+
statRow("Expected Goals (xG)",stats.homeXg,stats.awayXg,"",true)+
statRow("Shots",stats.homeShots,stats.awayShots)+
statRow("Shots On Target",stats.homeShotsOnTarget,stats.awayShotsOnTarget)+
statRow("Corners",stats.homeCorners,stats.awayCorners)+
statRow("Fouls",stats.homeFouls,stats.awayFouls);
}else{
statsBox.innerHTML='<p style="text-align:center;color:#94a3b8;">Brak statystyk</p>';
}

renderMomentum(momentum,events,clubLogos[home] || "",clubLogos[away] || "",home);
}

onSnapshot(matchRef,(snap)=>{
if(snap.exists()){
renderMatch(snap.data());
}else{
renderMatch(null);
}
});

setInterval(()=>{
if(latestLiveData){
document.getElementById("status").textContent=getLiveMinute(latestLiveData);
}
},15000);
}
</script>

</body>
</html>
